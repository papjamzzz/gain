<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gain — Dial in your AI</title>
  <meta name="description" content="A behavioral mixing board for AI. Same task. Different state. Measurably different output.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Abril+Fatface&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── VIDEO BACKGROUND ── */
    .bg-video {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto; height: auto;
      object-fit: cover;
      z-index: 0;
      opacity: .85;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,8,14,.55) 0%,
        rgba(4,8,14,.15) 40%,
        rgba(4,8,14,.15) 60%,
        rgba(4,8,14,.75) 100%
      );
      z-index: 1;
    }

    /* ── BRAND ── */
    .brand {
      position: fixed;
      top: 24px; left: 28px;
      font-family: 'Abril Fatface', serif;
      font-size: 28px;
      letter-spacing: .06em;
      background: linear-gradient(130deg,#00E8FF 0%,#A0C8FF 50%,#C0A0FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(0,200,255,.5));
      z-index: 10;
    }

    /* ── CENTER CONTENT ── */
    .center {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .tagline {
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(180,220,240,.7);
      text-shadow: 0 0 20px rgba(0,200,255,.3);
    }

    /* ── BOTTOM EMAIL FORM ── */
    .bottom {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
    }

    .dial-text {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(0,200,192,.6);
    }

    .form-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .email-input {
      flex: 1;
      height: 44px;
      background: rgba(6,10,15,.75);
      border: 1px solid rgba(0,200,192,.3);
      border-radius: 3px;
      color: #C8DCEA;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 0 14px;
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color .2s;
    }
    .email-input::placeholder { color: rgba(100,140,160,.5); }
    .email-input:focus { border-color: rgba(0,200,192,.7); }

    .join-btn {
      height: 44px;
      padding: 0 20px;
      background: rgba(0,200,192,.12);
      border: 1px solid rgba(0,200,192,.5);
      border-radius: 3px;
      color: #00E8E0;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 16px rgba(0,200,192,.15);
    }
    .join-btn:hover { background: rgba(0,200,192,.22); border-color: rgba(0,200,192,.8); }
    .join-btn:disabled { opacity: .4; cursor: not-allowed; }

    .status-msg {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      color: #00C8C0;
      min-height: 18px;
      text-align: center;
    }
    .status-msg.err { color: #E05050; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .bg-video { height: 100vh; width: auto; }
      .center { width: 90%; }
    }
  </style>
</head>
<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/static/promo.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="brand">gain</div>

  <div class="center">
    <div class="tagline">a behavioral mixing board for AI</div>
  </div>

  <div class="bottom">
    <div class="dial-text">dial it in.</div>
    <div class="form-row">
      <input class="email-input" id="email" type="email" placeholder="your email">
      <button class="join-btn" id="join-btn" onclick="joinWaitlist()">GET EARLY ACCESS</button>
    </div>
    <div class="status-msg" id="status"></div>
  </div>

  <script>
    async function joinWaitlist() {
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('join-btn');
      const msg   = document.getElementById('status');
      if (!email || !email.includes('@')) {
        msg.textContent = 'enter a valid email.';
        msg.className   = 'status-msg err';
        return;
      }
      btn.disabled = true;
      btn.textContent = '···';
      try {
        const r = await fetch('/waitlist', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email})
        });
        const d = await r.json();
        if (d.status === 'ok' || d.status === 'already_registered') {
          msg.textContent = "you're on the list.";
          msg.className   = 'status-msg';
          document.getElementById('email').value = '';
          btn.textContent = '✓';
        } else {
          throw new Error(d.error || 'error');
        }
      } catch(e) {
        msg.textContent = 'something went wrong. try again.';
        msg.className   = 'status-msg err';
        btn.disabled    = false;
        btn.textContent = 'GET EARLY ACCESS';
      }
    }
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinWaitlist();
    });
  </script>

</body>
</html>
