<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gain — Dial in your AI</title>
  <meta name="description" content="A behavioral mixing board for AI. Same task. Different state. Measurably different output.">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VPT05X5BC2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VPT05X5BC2');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Abril+Fatface&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto; height: auto;
      object-fit: cover;
      z-index: 0;
      opacity: .85;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,8,14,.55) 0%,
        rgba(4,8,14,.15) 40%,
        rgba(4,8,14,.15) 60%,
        rgba(4,8,14,.85) 100%
      );
      z-index: 1;
    }

    .brand {
      position: absolute;
      top: 24px; left: 28px;
      font-family: 'Abril Fatface', serif;
      font-size: 28px;
      letter-spacing: .06em;
      background: linear-gradient(130deg,#00E8FF 0%,#A0C8FF 50%,#C0A0FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(0,200,255,.5));
      z-index: 10;
    }

    .hero-bottom {
      position: absolute;
      bottom: 18px; left: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
      max-width: 380px;
    }

    .scroll-hint {
      position: absolute;
      bottom: 22px; right: 28px;
      z-index: 10;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: color .2s;
    }
    .scroll-hint:hover { color: rgba(255,255,255,.75); }
    .scroll-hint svg { animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    /* ── VIDEO SECTION ── */
    .video-section {
      background: #03070d;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .video-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(0,220,212,.6);
    }

    .video-headline {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 800;
      color: #D8EAF8;
      text-align: center;
      max-width: 600px;
      line-height: 1.25;
    }

    .video-sub {
      font-size: 14px;
      color: rgba(180,210,230,.5);
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
    }

    .yt-wrap {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(0,220,212,.15);
      box-shadow: 0 0 60px rgba(0,180,200,.08);
      margin-top: 12px;
    }

    .yt-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── SIGNUP SECTION ── */
    .signup-section {
      background: #020508;
      padding: 80px 20px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      border-top: 1px solid rgba(0,220,212,.08);
    }

    .signup-headline {
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 800;
      color: #D8EAF8;
      text-align: center;
    }

    .signup-sub {
      font-size: 13px;
      color: rgba(180,210,230,.45);
      text-align: center;
      max-width: 400px;
    }

    .form-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }

    .email-input {
      flex: 1;
      height: 44px;
      background: rgba(6,10,15,.8);
      border: 1px solid rgba(220,40,40,.4);
      border-radius: 3px;
      color: #E8D0D0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      padding: 0 13px;
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color .2s;
    }
    .email-input::placeholder { color: rgba(180,100,100,.5); }
    .email-input:focus { border-color: rgba(220,40,40,.8); }

    .join-btn {
      height: 44px;
      padding: 0 20px;
      background: rgba(200,20,20,.85);
      border: 1px solid rgba(255,60,60,.7);
      border-radius: 3px;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(200,20,20,.5);
    }
    .join-btn:hover { background: rgba(220,30,30,.95); box-shadow: 0 0 28px rgba(220,30,30,.7); }
    .join-btn:disabled { opacity: .4; cursor: not-allowed; }

    .status-msg {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      color: #FF6060;
      min-height: 16px;
      text-align: center;
    }
    .status-msg.ok { color: #00DDD4; }
    .status-msg.err { color: #FF4040; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .hero-bottom { left: 12px; right: 12px; max-width: calc(100% - 24px); }
      .form-row { flex-direction: column; }
      .join-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="/static/promo.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="brand">gain</div>

    <div class="hero-bottom">
      <div class="form-row">
        <input class="email-input" id="emailInputHero" type="email" placeholder="your@email.com" autocomplete="email"/>
        <button class="join-btn" onclick="joinWaitlist('emailInputHero','statusMsgHero')">GET EARLY ACCESS</button>
      </div>
      <div class="status-msg" id="statusMsgHero"></div>
    </div>

    <div class="scroll-hint" onclick="document.querySelector('.video-section').scrollIntoView({behavior:'smooth'})">
      Learn More
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v12M3 9l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

  <!-- VIDEO -->
  <section class="video-section">
    <div class="video-label">See it in action</div>
    <div class="video-headline">Same question. Different brain.</div>
    <div class="video-sub">Watch how changing the behavioral state produces measurably different output — without touching the prompt.</div>
    <div class="yt-wrap">
      <iframe
        src="https://www.youtube.com/embed/lgLKg9VHMkU?rel=0&modestbranding=1"
        title="Gain — The AI Behavioral Mixing Board"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <!-- SIGNUP -->
  <section class="signup-section">
    <div class="signup-headline">Get early access.</div>
    <div class="signup-sub">Gain is in private beta. Drop your email and we'll reach out when your spot is ready.</div>
    <div class="form-row">
      <input class="email-input" id="emailInput" type="email" placeholder="your@email.com" autocomplete="email"/>
      <button class="join-btn" onclick="joinWaitlist()">GET EARLY ACCESS</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </section>

  <script>
    async function joinWaitlist(inputId='emailInput', msgId='statusMsg') {
      const input = document.getElementById(inputId);
      const msg   = document.getElementById(msgId);
      const email = input.value.trim();
      msg.className = 'status-msg';
      if (!email || !email.includes('@')) { msg.textContent = 'Enter a valid email.'; return; }
      msg.textContent = '';
      try {
        const res = await fetch('/waitlist', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email})
        });
        const data = await res.json();
        if (data.status === 'ok') {
          msg.textContent = "You're in. We'll be in touch.";
          msg.classList.add('ok');
          input.value = '';
        } else if (data.status === 'already_registered') {
          msg.textContent = "Already on the list.";
          msg.classList.add('ok');
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.classList.add('err');
        }
      } catch {
        msg.textContent = 'Network error. Try again.';
        msg.classList.add('err');
      }
    }
    document.getElementById('emailInputHero').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinWaitlist('emailInputHero','statusMsgHero');
    });
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') joinWaitlist();
    });
  </script>

</body>
</html>
